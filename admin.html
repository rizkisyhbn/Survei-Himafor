<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Survei HIMAFOR FT-UMP</title>
    <link rel="icon" type="image/png" href="LOGO HIMAFOR FT-UMP.png">
    <link rel="apple-touch-icon" href="LOGO HIMAFOR FT-UMP.png">
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background: #eff3fb;
            color: #1f2937;
        }
        header {
            background: linear-gradient(135deg, #3755d8 0%, #4a71ff 100%);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-header {
            width: 52px;
            height: 52px;
            object-fit: contain;
            border-radius: 18px;
            background: rgba(255,255,255,0.18);
            padding: 8px;
        }
        header h1 {
            margin: 0;
            font-size: 1.55rem;
            letter-spacing: -0.02em;
        }
        .logout-btn {
            background: rgba(255,255,255,0.18);
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .logout-btn:hover {
            background: white;
            color: #3755d8;
        }
        main {
            max-width: 1080px;
            margin: 24px auto;
            padding: 0 18px 40px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            padding: 28px;
            margin-bottom: 24px;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #111827;
        }
        .field-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 1rem;
            color: #0f172a;
            background: #f8fafc;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        textarea {
            resize: vertical;
            min-height: 110px;
        }
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
            outline: none;
        }
        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }
        button {
            cursor: pointer;
            border: none;
            border-radius: 999px;
            padding: 12px 20px;
            background: #3755d8;
            color: white;
            font-size: 0.98rem;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        button:hover {
            background: #2f47ba;
            transform: translateY(-1px);
        }
        .question-card {
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 18px;
            background: #f8fbff;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
        .question-header strong {
            font-size: 1rem;
        }
        .option-list {
            margin-top: 12px;
            display: grid;
            gap: 12px;
        }
        .option-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }
        .small-button {
            background: #e2e8f0;
            color: #1f2937;
            padding: 10px 14px;
        }
        .small-button:hover {
            background: #cbd5e1;
        }
        .results-grid {
            display: grid;
            gap: 18px;
        }
        .result-summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: linear-gradient(135deg, #eef2ff, #ffffff);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: inset 0 0 0 1px rgba(99,102,241,0.08);
        }
        .metric-card strong {
            display: block;
            font-size: 1.35rem;
            color: #1f2937;
            margin-bottom: 6px;
        }
        .metric-card span {
            color: #64748b;
            font-size: 0.95rem;
        }
        .result-block {
            border-radius: 24px;
            padding: 24px;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
        }
        .result-block strong {
            display: block;
            margin-bottom: 14px;
            color: #0f172a;
            font-size: 1.05rem;
        }
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .result-item strong {
            font-size: 0.98rem;
            color: #094067;
            font-weight: 700;
        }
        .result-item .count-box {
            min-width: 80px;
            text-align: right;
            color: #334155;
            font-size: 0.96rem;
            font-weight: 700;
        }
        .stat-bar {
            flex: 1;
            height: 10px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
            margin-left: 18px;
            margin-right: 18px;
        }
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5 0%, #3b82f6 100%);
        }
        .text-response {
            display: grid;
            gap: 12px;
        }
        .text-response .response-item {
            padding: 16px 18px;
            background: #f8fafc;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            color: #334155;
            line-height: 1.6;
        }
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        @media (max-width: 850px) {
            .result-summary {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 650px) {
            .button-row {
                flex-direction: column;
            }
            header {
                flex-wrap: wrap;
                justify-content: center;
            }
            .header-left {
                justify-content: center;
            }
            main {
                padding: 0 12px 32px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="LOGO HIMAFOR FT-UMP.png" alt="Logo HIMAFOR" class="logo-header">
            <h1>Admin Survei HIMAFOR FT-UMP</h1>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>

    <main>
        <div class="card">
            <h2>Atur Survey</h2>
            <div class="field-group">
                <label for="surveyTitle">Judul Survey</label>
                <input id="surveyTitle" type="text" placeholder="Masukkan judul survey" />
            </div>
            <div class="field-group">
                <label for="surveyDescription">Deskripsi Survey</label>
                <textarea id="surveyDescription" placeholder="Masukkan deskripsi singkat survey"></textarea>
            </div>
            <div class="button-row">
                <button id="addQuestionBtn" type="button">Tambah Pertanyaan</button>
                <button id="saveSurveyBtn" type="button">Simpan Survey</button>
                <button id="loadSurveyBtn" type="button">Muat Survey</button>
                <button id="clearResponsesBtn" type="button" class="small-button">Hapus Semua Jawaban</button>
            </div>
        </div>

        <div id="questionList"></div>

        <div class="card">
            <div class="results-grid">
                <div class="metric-card">
                    <strong id="totalRespondents">0</strong>
                    <span>Total responden</span>
                </div>
                <div class="metric-card">
                    <strong id="totalQuestions">0</strong>
                    <span>Total pertanyaan</span>
                </div>
                <div class="metric-card">
                    <strong id="latestSubmission">-</strong>
                    <span>Terakhir kirim</span>
                </div>
            </div>

            <div id="resultsContainer">
                <div class="no-data">
                    Belum ada hasil. User belum mengisi survei atau survei belum dibuat.
                </div>
            </div>
        </div>
    </main>

    <script>
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        history.replaceState(null, '', location.href);
        history.pushState(null, '', location.href);
        window.addEventListener('popstate', () => {
            history.pushState(null, '', location.href);
        });

        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        });

        const surveyKey = 'himaforSurveyData';
        const responseKey = 'himaforSurveyResponses';

        let survey = { title: '', description: '', questions: [] };

        const surveyTitleInput = document.getElementById('surveyTitle');
        const surveyDescriptionInput = document.getElementById('surveyDescription');
        const questionList = document.getElementById('questionList');
        const resultsContainer = document.getElementById('resultsContainer');
        const totalRespondents = document.getElementById('totalRespondents');
        const totalQuestions = document.getElementById('totalQuestions');
        const latestSubmission = document.getElementById('latestSubmission');
        const addQuestionBtn = document.getElementById('addQuestionBtn');
        const saveSurveyBtn = document.getElementById('saveSurveyBtn');
        const loadSurveyBtn = document.getElementById('loadSurveyBtn');
        const clearResponsesBtn = document.getElementById('clearResponsesBtn');

        function persistSurveyData() {
            survey.title = surveyTitleInput.value.trim();
            survey.description = surveyDescriptionInput.value.trim();
            localStorage.setItem(surveyKey, JSON.stringify(survey));
        }

        surveyTitleInput.addEventListener('input', persistSurveyData);
        surveyDescriptionInput.addEventListener('input', persistSurveyData);
        window.addEventListener('beforeunload', persistSurveyData);

        function loadSurvey() {
            const saved = localStorage.getItem(surveyKey);
            if (saved) {
                survey = JSON.parse(saved);
            } else {
                survey = { title: '', description: '', questions: [] };
            }
            surveyTitleInput.value = survey.title || '';
            surveyDescriptionInput.value = survey.description || '';
            renderQuestionList();
            renderResults();
        }

        function saveSurvey() {
            persistSurveyData();
            alert('Survey disimpan.');
            renderQuestionList();
            renderResults();
        }

        function addQuestion() {
            survey.questions.push({
                questionText: '',
                type: 'radio',
                options: ['', '']
            });
            persistSurveyData();
            renderQuestionList();
        }

        function deleteQuestion(index) {
            survey.questions.splice(index, 1);
            persistSurveyData();
            renderQuestionList();
        }

        function addOption(questionIndex) {
            survey.questions[questionIndex].options.push('');
            persistSurveyData();
            renderQuestionList();
        }

        function deleteOption(questionIndex, optionIndex) {
            survey.questions[questionIndex].options.splice(optionIndex, 1);
            persistSurveyData();
            renderQuestionList();
        }

        function renderQuestionList() {
            questionList.innerHTML = '';
            if (survey.questions.length === 0) {
                const emptyCard = document.createElement('div');
                emptyCard.className = 'card';
                emptyCard.innerHTML = '<p>Belum ada pertanyaan. Tambahkan pertanyaan terlebih dahulu.</p>';
                questionList.appendChild(emptyCard);
                return;
            }

            survey.questions.forEach((question, qIndex) => {
                const card = document.createElement('div');
                card.className = 'card question-card';

                const header = document.createElement('div');
                header.className = 'question-header';
                header.innerHTML = `<strong>Pertanyaan ${qIndex + 1}</strong>`;
                const deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'small-button';
                deleteBtn.textContent = 'Hapus';
                deleteBtn.addEventListener('click', () => deleteQuestion(qIndex));
                header.appendChild(deleteBtn);
                card.appendChild(header);

                const questionGroup = document.createElement('div');
                questionGroup.className = 'field-group';
                questionGroup.innerHTML = `
                    <label>Pertanyaan</label>
                    <input type="text" value="${question.questionText}" placeholder="Tulis pertanyaan..." />
                `;
                questionGroup.querySelector('input').addEventListener('input', event => {
                    survey.questions[qIndex].questionText = event.target.value;
                    persistSurveyData();
                });
                card.appendChild(questionGroup);

                const typeGroup = document.createElement('div');
                typeGroup.className = 'field-group';
                typeGroup.innerHTML = `
                    <label>Jenis Jawaban</label>
                    <select>
                        <option value="radio">Pilihan ganda</option>
                        <option value="text">Jawaban teks</option>
                    </select>
                `;
                const typeSelect = typeGroup.querySelector('select');
                typeSelect.value = question.type;
                typeSelect.addEventListener('change', event => {
                    survey.questions[qIndex].type = event.target.value;
                    if (event.target.value === 'text') {
                        survey.questions[qIndex].options = [];
                    } else if (survey.questions[qIndex].options.length === 0) {
                        survey.questions[qIndex].options = ['', ''];
                    }
                    persistSurveyData();
                    renderQuestionList();
                });
                card.appendChild(typeGroup);

                if (question.type === 'radio') {
                    const optionGroup = document.createElement('div');
                    optionGroup.className = 'field-group';
                    optionGroup.innerHTML = '<label>Opsi Jawaban</label>';
                    const optionList = document.createElement('div');
                    optionList.className = 'option-list';

                    question.options.forEach((option, optIndex) => {
                        const optionRow = document.createElement('div');
                        optionRow.className = 'option-row';
                        optionRow.innerHTML = `
                            <input type="text" value="${option}" placeholder="Tulis pilihan..." />
                            <button type="button" class="small-button">Hapus</button>
                        `;
                        optionRow.querySelector('input').addEventListener('input', event => {
                            survey.questions[qIndex].options[optIndex] = event.target.value;
                            persistSurveyData();
                        });
                        optionRow.querySelector('button').addEventListener('click', () => deleteOption(qIndex, optIndex));
                        optionList.appendChild(optionRow);
                    });

                    optionGroup.appendChild(optionList);

                    const addOptionButton = document.createElement('button');
                    addOptionButton.type = 'button';
                    addOptionButton.className = 'small-button';
                    addOptionButton.textContent = 'Tambah Opsi';
                    addOptionButton.addEventListener('click', () => addOption(qIndex));
                    optionGroup.appendChild(addOptionButton);

                    card.appendChild(optionGroup);
                }

                questionList.appendChild(card);
            });
        }

        function renderResults() {
            const responses = JSON.parse(localStorage.getItem(responseKey) || '[]');
            resultsContainer.innerHTML = '';

            totalRespondents.textContent = responses.length;
            totalQuestions.textContent = survey.questions.length;
            latestSubmission.textContent = responses.length
                ? new Date(responses[responses.length - 1].submittedAt).toLocaleString('id-ID', {
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                })
                : '-';

            if (!responses.length || survey.questions.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-data">
                        Belum ada hasil. User belum mengisi survei atau survei belum dibuat.
                    </div>
                `;
                return;
            }

            survey.questions.forEach((question, index) => {
                const block = document.createElement('div');
                block.className = 'result-block';

                const title = document.createElement('strong');
                title.textContent = `Pertanyaan ${index + 1}: ${question.questionText}`;
                block.appendChild(title);

                if (question.type === 'radio') {
                    const counts = {};
                    question.options.forEach(option => {
                        counts[option || '(kosong)'] = 0;
                    });

                    responses.forEach(resp => {
                        const answer = resp.answers[index] || '(kosong)';
                        counts[answer] = (counts[answer] || 0) + 1;
                    });

                    const maxCount = Math.max(...Object.values(counts));
                    const resultList = document.createElement('div');
                    resultList.className = 'result-list';

                    Object.entries(counts).forEach(([option, count]) => {
                        const item = document.createElement('div');
                        item.className = 'result-item';

                        const label = document.createElement('strong');
                        label.textContent = option;

                        const barWrapper = document.createElement('div');
                        barWrapper.className = 'stat-bar';
                        const fill = document.createElement('div');
                        fill.className = 'stat-fill';
                        fill.style.width = `${maxCount ? (count / maxCount) * 100 : 0}%`;
                        barWrapper.appendChild(fill);

                        const countBox = document.createElement('div');
                        countBox.className = 'count-box';
                        countBox.textContent = `${count} suara`;

                        item.appendChild(label);
                        item.appendChild(barWrapper);
                        item.appendChild(countBox);
                        resultList.appendChild(item);
                    });

                    block.appendChild(resultList);
                } else {
                    const responseList = document.createElement('div');
                    responseList.className = 'text-response';
                    responses.forEach(resp => {
                        const responseItem = document.createElement('div');
                        responseItem.className = 'response-item';
                        responseItem.textContent = resp.answers[index] || '-';
                        responseList.appendChild(responseItem);
                    });
                    block.appendChild(responseList);
                }

                resultsContainer.appendChild(block);
            });
        }

        addQuestionBtn.addEventListener('click', addQuestion);
        saveSurveyBtn.addEventListener('click', saveSurvey);
        loadSurveyBtn.addEventListener('click', loadSurvey);
        clearResponsesBtn.addEventListener('click', () => {
            if (confirm('Hapus semua jawaban user?')) {
                localStorage.removeItem(responseKey);
                renderResults();
            }
        });

        loadSurvey();
    </script>
</body>
</html>
